version: '3.8'

services:
  vue-web:
    image: nginx:alpine
    container_name: vue-nginx-container
    restart: always
    ports:
      - "80:80"  # 左边是宿主机端口，右边是容器端口
    volumes:
      # 1. 挂载构建好的 dist 目录到 Nginx 默认目录
      - ./dist:/usr/share/nginx/html
      # 2. 挂载自定义的 Nginx 配置文件
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # 3. (可选) 挂载日志目录，方便排查问题
      - ./nginx/logs:/var/log/nginx
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
