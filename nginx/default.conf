# Put this file under the nginx http {} include path, for example:
#   include /etc/nginx/conf.d/*.conf;
#
# The map block must live in http context. If your deployment system only
# allows editing a single server block, move the map block into nginx.conf.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name edupivot.xyz;

    ssl_certificate /etc/nginx/cert/edupivot.xyz.pem;
    ssl_certificate_key /etc/nginx/cert/edupivot.xyz.key;

    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/SapientiaCloud-EduPivot;
    index index.html index.htm;

    location /src/assets/ {
        rewrite ^/src/assets/(.*)$ /assets/$1 last;
    }

    location ~ ^/sapientiacloud- {
        proxy_pass http://117.72.194.197:31589;
        proxy_set_header Host 117.72.194.197:31589;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1h;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        add_header X-Proxy-Cache $upstream_cache_status;
    }

    location ^~ /rtc {
        proxy_pass http://117.72.194.197:7880;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host 117.72.194.197:7880;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location ^~ /twirp/ {
        proxy_pass http://117.72.194.197:7880;

        proxy_http_version 1.1;
        proxy_set_header Host 117.72.194.197:7880;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location ^~ /assets/3Dmodel/ {
        root /var/www/SapientiaCloud-EduPivot;
        try_files $uri =404;

        charset utf-8;

        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(gltf|bin|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;

        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        charset utf-8;
    }

    # Dedicated websocket upgrade path for classroom seat sync.
    # Keep this block before the generic /api/ proxy so it wins the match.
    location ^~ /api/classroom/ws/ {
        proxy_pass http://localhost:31600;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location ^~ /api/celestial-hub/message/stream {
        proxy_pass http://localhost:31600;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    location ^~ /api/celestial-hub/question/stream {
        proxy_pass http://localhost:31600;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    location /api/ {
        proxy_pass http://localhost:31600;
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
