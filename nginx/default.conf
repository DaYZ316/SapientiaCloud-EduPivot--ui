server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # 处理 /src/assets/ 路径映射到 /assets/
    location /src/assets/ {
        rewrite ^/src/assets/(.*)$ /assets/$1 last;
    }
    
    # 处理静态资源文件，不 fallback 到 index.html
    location ~* \.(gltf|bin|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # API代理
    location /api {
        proxy_pass http://117.72.194.197:31600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 静态文件服务
    location / {
        try_files $uri $uri/ /index.html;
    }
}

